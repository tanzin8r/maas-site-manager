[build-system]
build-backend = "setuptools.build_meta"
requires = [
  "setuptools",
]

[project]
name = "msm"
description = "MAAS Site Manager"
readme = "README.md"
maintainers = [
  { name = "MAAS Developers", email = "maas-devel@lists.launchpad.net" },
]
authors = [
  { name = "MAAS Developers", email = "maas-devel@lists.launchpad.net" },
]
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
]
dynamic = [
  "version",
]
dependencies = [
  "alembic[tz]",
  "baize",
  "beautifulsoup4",
  "fastapi",
  "Jinja2",
  "passlib[bcrypt]",
  "prometheus-fastapi-instrumentator",
  "pydantic[email]",
  "pydantic-settings",
  "python-jose[cryptography]",
  "python-multipart",
  "pytz",
  "snap-helpers",
  "SQLAlchemy[postgresql_asyncpg,postgresql_psycopg]",
  "StrEnum", # emulate enum.StrEnum, which is available in Python3.11
  "ujson", # faster JSON encoding/decoding (for fastapi)
  "uvicorn[standard]",
  "uvloop",
]
[project.optional-dependencies]
testing = [
  "httpx",
  "psycopg",
  "pytest",
  "pytest-asyncio",
  "pytest-mock",
  "pytest-postgresql",
  "pytest-xdist",
]
[project.scripts]
msm-admin = "msm.cmd.admin:script"
msm-api = "msm.api:run"
msm-sampledata = "msm.cmd.sampledata:script"
[project.entry-points."snaphelpers.hooks"]
configure = "msm.snap:configure_hook"

[tool.setuptools.package-data]
msm = [
  "db/alembic/alembic.ini",
  "db/alembic/script.py.mako",
  "snap/templates/*",
]

[tool.setuptools.dynamic]
version = { attr = "msm.__version__" }

[tool.setuptools.packages.find]
include = ["msm*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests/"]
junit_logging = "all"
junit_suite_name = "maas-site-manager backend tests"

[tool.coverage.report]
fail_under = 80.0
show_missing = true
skip_covered = true

[tool.coverage.run]
source = ["msm"]
omit = ["msm/db/alembic/env.py", "msm/sampledata/*", "msm/cmd/sampledata/*"]

[tool.mypy]
install_types = true
junit_xml = "../junit-mypy.xml"
non_interactive = true
plugins = ["pydantic.mypy"]
strict = true

[tool.ruff]
line-length = 79

[tool.ruff.lint]
select = [
  "I",    # isort
  "RUF",  # ruff
  "UP",   # pyupgrade
  "F401", # unused imports
]

[tool.ruff.lint.isort]
combine-as-imports = true
force-sort-within-sections = true
