[globals]
lint_files =
  msm/

[tox]
minversion = 4
skipsdist = True
envlist = test

[testenv]
pass_env =
  POSTGRES_HOST
  POSTGRES_PORT
  POSTGRES_DB
  POSTGRES_USER
  POSTGRES_PASSWORD

[testenv:shell]
deps =
  -e .
  ipython
commands =
  ipython

[testenv:test]
deps =
  .[testing]
commands =
  pytest -vs {posargs}

[testenv:format]
deps =
  black
  isort
  pyproject-fmt
commands =
  isort {[globals]lint_files}
  black -q {[globals]lint_files}
  - pyproject-fmt pyproject.toml

[testenv:lint]
deps =
  black
  flake8
  flake8-pyproject
  isort
  pyproject-fmt
commands =
  isort --check-only --diff {[globals]lint_files}
  black --check {[globals]lint_files}
  flake8 {[globals]lint_files}
  pyproject-fmt --check pyproject.toml

[testenv:check]
deps =
  .[testing]
  mypy
commands =
  mypy -p msm {posargs}

[testenv:run]
deps =
  -e .
  uvicorn
commands =
  uvicorn --factory msm.user_api:create_app --host 0.0.0.0 --reload {posargs}
