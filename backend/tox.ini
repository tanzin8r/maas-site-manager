[tox]
requires =
    tox>=4.2
env_list =
    test
no_package = true

[testenv]
deps =
    -r requirements.txt
    .[testing]
pass_env =
    MSM_*
commands =
    pytest -vs {posargs}

[testenv:test]
deps =
    -r requirements.txt
    .[testing]
    pytest-asyncio
    pytest-cov
commands =
    pytest -n auto --cov {posargs}

[testenv:test-unit]
deps =
    -r requirements.txt
    .[testing]
    pytest-asyncio
commands =
    pytest -n auto {posargs}

[testenv:shell]
deps =
    -e .
    -r requirements.txt
    ipython
commands =
    ipython --simple-prompt {posargs}

[testenv:format]
deps =
    pyproject-fmt==2.1.3
    ruff==0.5
    tox-ini-fmt==1.3.1
commands =
    ruff format {[globals]lint_files}
    ruff check --fix {[globals]lint_files}
    - pyproject-fmt pyproject.toml
    - tox-ini-fmt tox.ini

[testenv:lint]
deps =
    pyproject-fmt==2.1.3
    ruff==0.5
commands =
    ruff check {[globals]lint_files}
    pyproject-fmt --check pyproject.toml

[testenv:check]
deps =
    -r requirements.txt
    .[testing]
    mypy==1.8
commands =
    mypy {[globals]lint_files} {posargs}

[testenv:update-deps]
deps =
    pip-tools
commands =
    pip-compile -U -o requirements.txt pyproject.toml

[testenv:admin,api,sampledata]
deps =
    -e .
    -r requirements.txt
set_env =
    MSM_DEV_MODE = true
commands =
    msm-{envname} {posargs}

[testenv:alembic]
deps =
    -e .
    -r requirements.txt
commands =
    alembic -c msm/db/alembic/alembic.ini {posargs}

[globals]
lint_files =
    msm/ \
    temporal/resources \
    temporal/tests \
    tests/
