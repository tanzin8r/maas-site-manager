name: maas-site-manager
base: ubuntu@24.04
version: "0.1"
summary: MAAS Site Manager ROCK OCI
description: |
    MAAS Site Manager built from the official MAAS Site Manager
    package.  For more information on ROCKs, visit
    the https://github.com/canonical/rockcraft.
license: Apache-2.0
platforms:
    amd64:

parts:
    backend:
        plugin: python
        python-requirements:
            - requirements.txt
        source: ./backend
        stage-packages:
            - python3-dev
            - python3-venv
    temporal:
        plugin: dump
        source: ./backend/scripts
        organize:
            start-worker.sh: app/scripts/start-worker.sh
        stage:
            - app/scripts/start-worker.sh
    frontend:
        plugin: nil
        source: .
        build-packages:
            - git
        build-snaps:
            - node/22/stable
        override-build: |
            cd frontend
            npm install --location=global --prefix ${CRAFT_PART_BUILD} yarn
            [[ -v http_proxy ]] && yarn config set httpProxy ${http_proxy}
            [[ -v https_proxy ]] && yarn config set httpsProxy ${https_proxy}
            yarn config list
            YARN_ENABLE_PROGRESS_BARS=false MSW_SKIP_POSTINSTALL=1 yarn install --immutable
            echo "Building frontend"
            yarn run build
            cp -a dist ${CRAFT_PART_INSTALL}/static

services:
    msm:
        override: replace
        command: /bin/msm-api
        startup: disabled

    temporal-worker:
        override: replace
        summary: "temporal worker"
        startup: disabled
        command: "./app/scripts/start-worker.sh"
        environment:
            TEMPORAL_HOST: localhost:7233
            TEMPORAL_NAMESPACE: default
            TEMPORAL_QUEUE: test-queue
            TEMPORAL_PROMETHEUS_PORT: "9000"
            TEMPORAL_TLS_ROOT_CAS: ""
            TEMPORAL_AUTH_PROVIDER: "" # "google" or "candid"
            TEMPORAL_ENCRYPTION_KEY: ""
            TEMPORAL_SENTRY_DSN: ""
            TEMPORAL_SENTRY_RELEASE: ""
            TEMPORAL_SENTRY_ENVIRONMENT: ""
            TEMPORAL_SENTRY_REDACT_PARAMS: "False"
            TEMPORAL_SENTRY_SAMPLE_RATE: "1.0"
            TEMPORAL_CANDID_URL: ""
            TEMPORAL_CANDID_USERNAME: ""
            TEMPORAL_CANDID_PRIVATE_KEY: ""
            TEMPORAL_CANDID_PUBLIC_KEY: ""
            TEMPORAL_OIDC_PROJECT_ID: ""
            TEMPORAL_OIDC_PRIVATE_KEY_ID: ""
            TEMPORAL_OIDC_PRIVATE_KEY: ""
            TEMPORAL_OIDC_CLIENT_EMAIL: ""
            TEMPORAL_OIDC_CLIENT_ID: ""
            TEMPORAL_OIDC_AUTH_URI: ""
            TEMPORAL_OIDC_TOKEN_URI: ""
            TEMPORAL_OIDC_AUTH_CERT_URL: ""
            TEMPORAL_OIDC_CLIENT_CERT_URL: ""

            # Vault variables
            TEMPORAL_VAULT_ADDR: ""
            TEMPORAL_VAULT_CACERT_BYTES: ""
            TEMPORAL_VAULT_ROLE_ID: ""
            TEMPORAL_VAULT_ROLE_SECRET_ID: ""
            TEMPORAL_VAULT_MOUNT: ""
            TEMPORAL_VAULT_CERT_PATH: ""
