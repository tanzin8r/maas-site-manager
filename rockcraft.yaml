name: maas-site-manager
base: ubuntu@24.04
version: "0.1"
summary: MAAS Site Manager ROCK OCI
description: |
  MAAS Site Manager built from the official MAAS Site Manager
  package.  For more information on ROCKs, visit
  the https://github.com/canonical/rockcraft.
license: Apache-2.0
platforms:
  amd64:

parts:
  backend:
    plugin: python
    python-requirements:
      - requirements.txt
    source: ./backend
    stage-packages:
      - python3-dev
      - python3-venv
  frontend:
    plugin: nil
    source: .
    build-packages:
      - git
    build-snaps:
      - node/20/stable
    override-build: |
      cd frontend
      npm install --location=global --prefix ${CRAFT_PART_BUILD} yarn
      [[ -v http_proxy ]] && yarn config set httpProxy ${http_proxy}
      [[ -v https_proxy ]] && yarn config set httpsProxy ${https_proxy}
      yarn config list
      YARN_ENABLE_PROGRESS_BARS=false MSW_SKIP_POSTINSTALL=1 yarn install --immutable
      echo "Building frontend"
      yarn run build
      cp -a dist ${CRAFT_PART_INSTALL}/static

services:
  msm:
    override: replace
    command: /usr/bin/msm-api
    startup: enabled

checks:
  http-test:
    override: replace
    http:
      url: http://localhost:8000/version
