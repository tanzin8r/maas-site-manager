pipeline:
  - install-dependencies
  - lint
  - build
  - test

jobs:
  install-dependencies:
    architectures: amd64
    series: noble
    packages:
      - make
      - sudo
      - git
      - curl
    root: true
    run: |
      make install-dependencies

  lint:
    architectures: amd64
    series: noble
    root: true
    run: |
      make ci-dep
      make ci-lint

  build:
    architectures: amd64
    series: noble
    root: true
    run: |
      make ci-dep
      make ci-build

  test:
    architectures: amd64
    series: noble
    root: false
    run: |
      make ci-dep
      make ci-test
