name: CI check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}

    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dorny/paths-filter@61f87a10cd2c304679af17bb73ef192addf33c1c
        id: filter
        with:
          filters: |
            lint:
              - 'frontend/**/*.ts'
              - 'frontend/**/*.tsx'
              - 'frontend/**/*.js'
              - 'frontend/**/*.jsx'
              - 'frontend/**/*.scss'
              - 'frontend/package.json'
              - 'frontend/Makefile'
              - 'backend/**/*.py'
              - 'backend/pyproject.toml'
              - 'backend/tox.ini'
              - 'backend/Makefile'
              - 'Makefile'
            backend:
              - 'backend/**/*.py'
              - 'backend/pyproject.toml'
              - 'backend/tox.ini'
              - 'backend/Makefile'
            frontend:
              - 'frontend/**/*.ts'
              - 'frontend/**/*.tsx'
              - 'frontend/**/*.js'
              - 'frontend/**/*.jsx'
              - 'frontend/**/*.scss'
              - 'frontend/package.json'
              - 'frontend/Makefile'
            docs:
              - 'rtd-docs/**'

  lint:
    runs-on: ubuntu-24.04
    needs: changes
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.lint == 'true' }}
    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Run lint
        run: |
          su ubuntu -c "make ci-lint"

  test-backend:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.backend == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Test
        run: |
          CACHE_DIR=/home/ubuntu/.cache/pip
          su ubuntu -c "PIP_CACHE_DIR=$CACHE_DIR make -C backend ci-test"

  test-frontend:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.frontend == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Test
        run: |
          su ubuntu -c "make -C frontend ci-test"
  test-docs:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.docs == 'true' }}
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      with:
        fetch-depth: 0
    - name: Create venv
      working-directory: "rtd-docs"
      run: make install
    - name: Lint markdown
      working-directory: "rtd-docs"
      run: make lint-md
    - name: Test build
      working-directory: "rtd-docs"
      run: make html

  ci-check:
    runs-on: ubuntu-slim
    if: always()
    needs: [lint, test-backend, test-frontend, test-docs]
    steps:
      - name: Check job results
        if: needs.*.result == 'failure'
        run: exit 1
