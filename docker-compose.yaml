version: "3.9"
services:
  postgres:
    image: postgres:14
    env_file: .env.dev
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    env_file: .env.dev
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ./backend
    volumes:
      - ./backend:/app
        # mount .tox and egg-info sub folders to custom volumes
        # to avoid conflicts with host (e.g. tox lock overridden by container)
      - tox:/app/.tox/
      - egg-info:/app/msm.egg-info/
    ports:
      - "8000:8000"
    links:
      - "postgres:db"

volumes:
  postgres-data:
  tox:
  egg-info:
